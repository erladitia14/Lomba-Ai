<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Hazza LearnAI mengubah PDF materi belajar menjadi latihan soal interaktif berbasis Flask tanpa login dan tanpa API eksternal.">
    <title>{% block title %}Hazza LearnAI{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-orb orb-one"></div>
    <div class="bg-orb orb-two"></div>

    <nav class="navbar">
        <a class="brand" href="{{ url_for('main.index') }}">Hazza<span>LearnAI</span></a>
        <div class="nav-links">
            <a href="{{ url_for('main.index') }}">Home</a>
            <a id="nav-upload" class="nav-button" href="{{ url_for('main.upload') }}">Upload PDF</a>
        </div>
    </nav>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section class="flash-wrap">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
